optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 2.0e-4
  weight_decay: 1.0e-4

scheduler:
  _target_: models.schedulers.LinearWarmupCosineAnnealingLR
  _partial_: true
  warmup_epochs: 5
  max_epochs: ${trainer.max_epochs}
  eta_min: 1.0e-6

domain_optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  weight_decay: 0.0

domain_scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  _partial_: true
  step_size: 1
  gamma: 0.96

domain_optimizer_lr_factor: 0.1
