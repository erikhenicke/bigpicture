slurm:
  partition: robolab
  cpus_per_task: 4
  mem_per_cpu: 8GB

global_overrides:
  num_reruns: 1
  data.frac: 1.0 
  data.preprocessed_dir: FMoW_LandSat_Norm
  trainer.max_epochs: 10
  optim: adam_warmup_cosine

experiments:
  # ---------------- MultSim: detach_lr_for_task ablation ----------------
  multsim_default:
    model: densenet_multsim

  multsim_detach_lr:
    model: densenet_multsim
    overrides:
      model.detach_lr_for_task: true
      model.landsat_channel_init: "he"

  # ---------------- D3G: detach_lr/hr_for_consistency ablation -----------
  # d3g_default:
  #   model: densenet_d3g

  d3g_detach_lr:
    model: densenet_d3g
    overrides:
      model.detach_lr_for_consistency: true
      model.landsat_channel_init: "average"

