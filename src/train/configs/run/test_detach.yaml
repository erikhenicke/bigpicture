slurm:
  partition: robolab
  cpus_per_task: 4
  mem_per_cpu: 8GB

global_overrides:
  data.frac: 0.01
  trainer.max_epochs: 5
  optim: adam_warmup_cosine
  data.preprocessed_dir: FMoW_LandSat_Norm

experiments:
  # ---------------- GeoPrior: detach_lr_for_task ablation ----------------
  geoprior_default:
    model: densenet_geoprior

  geoprior_detach_lr:
    model: densenet_geoprior
    overrides:
      model.detach_lr_for_task: true

  # ---------------- D3G: detach_lr/hr_for_consistency ablation -----------
  d3g_default:
    model: densenet_d3g

  d3g_detach_lr:
    model: densenet_d3g
    overrides:
      model.detach_lr_for_consistency: true

  d3g_detach_hr:
    model: densenet_d3g
    overrides:
      model.detach_hr_for_consistency: true

  d3g_detach_both:
    model: densenet_d3g
    overrides:
      model.detach_lr_for_consistency: true
      model.detach_hr_for_consistency: true
