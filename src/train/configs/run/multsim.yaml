slurm:
  partition: robolab
  cpus_per_task: 4
  mem_per_cpu: 8GB

global_overrides:
  data.frac: 1.0
  trainer.max_epochs: 50
  optim: adam_warmup_cosine
  data.preprocessed_dir: FMoW_LandSat_Norm

experiments:
  # ---------------- Fusion variants ------------------------------------
  concat:
    model: densenet_concat
    overrides:
      trainer.branch_ablation: true

  film:
    model: densenet_film
    overrides:
      trainer.branch_ablation: true

  geoprior:
    model: densenet_geoprior
    overrides:
      trainer.branch_ablation: true

  d3g:
    model: densenet_d3g

  multsim:
    model: densenet_multsim
    overrides:
      trainer.branch_ablation: true

  # ---------------- Detach ablation ---------------------------
  multsim_detach:
    model: densenet_multsim
    overrides:
      model.detach_lr_for_task: true
      trainer.branch_ablation: true

  concat_detach:
    model: densenet_concat
    overrides:
      model.detach_lr_for_task: true
      trainer.branch_ablation: true

  # ---------------- ReLU ablation -----------------------------
  multsim_no_relu:
    model: densenet_multsim
    overrides:
      model.fusion.pre_fusion_relu: false
      trainer.branch_ablation: true

  film_relu:
    model: densenet_film
    overrides:
      model.fusion.pre_fusion_relu: true
      trainer.branch_ablation: true