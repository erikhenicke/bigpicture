slurm:
  partition: robolab
  cpus_per_task: 4
  mem_per_cpu: 8GB

global_overrides:
  data.frac: 1.0
  trainer.max_epochs: 50
  optim: adam_warmup_cosine
  data.preprocessed_dir: FMoW_LandSat_Norm

experiments:
  # ---------------- Fusion variants ------------------------------------
  concat:
    model: densenet_concat
    overrides:
      trainer.branch_ablation: true

  film:
    model: densenet_film
    overrides:
      trainer.branch_ablation: true

  geoprior:
    model: densenet_geoprior
    overrides:
      trainer.branch_ablation: true

  d3g:
    model: densenet_d3g

  multsim:
    model: densenet_multsim
    overrides:
      trainer.branch_ablation: true

  # ---------------- Gradient ablation ---------------------------
  multsim_detach:
    model: densenet_multsim
    overrides:
      model.detach_lr_for_task: true
      trainer.branch_ablation: true
  
  multsim_no_domain:
    model: densenet_multsim
    overrides:
      model.lr_domain_loss_coeff: 0.0
      trainer.branch_ablation: true

  concat_detach:
    model: densenet_concat
    overrides:
      model.detach_lr_for_task: true
      trainer.branch_ablation: true

  d3g_detach_lr:
    model: densenet_d3g
    overrides:
      model.detach_lr_for_consistency: true

  d3g_detach_hr:
    model: densenet_d3g
    overrides:
      model.detach_hr_for_consistency: true

  d3g_detach_both:
    model: densenet_d3g
    overrides:
      model.detach_hr_for_consistency: true
      model.detach_lr_for_consistency: true

  d3g_detach_both_constnorm:
    model: densenet_d3g
    overrides:
      model.detach_hr_for_consistency: true
      model.detach_lr_for_consistency: true
      data.preprocessed_dir: FMoW_LandSat_

  film_detach:
    model: densenet_film
    overrides:
      model.detach_lr_for_task: true
      trainer.branch_ablation: true

  film_no_domain:
    model: densenet_film
    overrides:
      model.lr_domain_loss_coeff: 0.0
      trainer.branch_ablation: true

  # ---------------- ReLU ablation -----------------------------
  multsim_no_relu:
    model: densenet_multsim
    overrides:
      model.fusion.pre_fusion_relu: false
      trainer.branch_ablation: true

  film_relu:
    model: densenet_film
    overrides:
      model.fusion.pre_fusion_relu: true
      trainer.branch_ablation: true

  # ------------------ Label Smoothing ------------------
  multsim_ls_0_1:
    model: densenet_multsim
    overrides:
      trainer.label_smoothing: 0.1
      trainer.branch_ablation: true

  multsim_ls_0_1_constnorm:
    model: densenet_multsim
    overrides:
      trainer.label_smoothing: 0.1
      data.preprocessed_dir: FMoW_LandSat_
      trainer.branch_ablation: true

  # ------------------ Channel Init ------------------
  multsim_channel_init_he:
    model: densenet_multsim
    overrides:
      model.landsat_channel_init: "he"
      trainer.branch_ablation: true
    
  multsim_channel_init_zero:
    model: densenet_multsim
    overrides:
      model.landsat_channel_init: "zero"
      trainer.branch_ablation: true

  # ------------------ Dataset Normalization -----------------------
  # Not data specific normalization but with 0.5
  multsim_constnorm:
    model: densenet_multsim
    overrides:
      data.preprocessed_dir: FMoW_LandSat_
      trainer.branch_ablation: true
  
  concat_constnorm:
    model: densenet_concat
    overrides:
      data.preprocessed_dir: FMoW_LandSat_
      trainer.branch_ablation: true

  film_constnorm:
    model: densenet_film
    overrides:
      data.preprocessed_dir: FMoW_LandSat_
      trainer.branch_ablation: true

  # ------------------ Spatial Encoding -----------------------
  multsim_overlap_binary:
    model: densenet_multsim
    overrides:
      spatial: binary_overlap_mask_encoding
      trainer.branch_ablation: true

  multsim_overlap_gaussian:
    model: densenet_multsim
    overrides:
      spatial: gaussian_overlap_mask_encoding
      trainer.branch_ablation: true

  multsim_overlap_gaussian_constnorm:
    model: densenet_multsim
    overrides:
      data.preprocessed_dir: FMoW_LandSat_
      spatial: gaussian_overlap_mask_encoding
      trainer.branch_ablation: true

  multsim_coord:
    model: densenet_multsim
    overrides:
      spatial: coord_encoding
      trainer.branch_ablation: true
  
  multsim_fourier:
    model: densenet_multsim
    overrides:
      spatial: fourier_encoding
      trainer.branch_ablation: true

  film_overlap_binary:
    model: densenet_film
    overrides:
      spatial: binary_overlap_mask_encoding
      trainer.branch_ablation: true

  film_overlap_gaussian:
    model: densenet_film
    overrides:
      spatial: gaussian_overlap_mask_encoding
      trainer.branch_ablation: true
  
  film_coord:
    model: densenet_film
    overrides:
      spatial: coord_encoding
      trainer.branch_ablation: true

  film_fourier:
    model: densenet_film
    overrides:
      spatial: fourier_encoding
      trainer.branch_ablation: true

  film_overlap_gaussian_fourier:
    model: densenet_film
    overrides:
      spatial: gaussian_overlap_fourier 
      trainer.branch_ablation: true

  film_overlap_binary_fourier:
    model: densenet_film
    overrides:
      spatial: binary_overlap_fourier 
      trainer.branch_ablation: true

  # ----------------- Alternate Freezing ----------------------
  multsim_alternate_branches:
    model: densenet_multsim
    overrides:
      data.preprocessed_dir: FMoW_LandSat_
      trainer.branch_ablation: true
      trainer.alternating_freeze: true
      trainer.alternating_freeze_period: 2

  multsim_alternate_overlap_gaussian:
    model: densenet_multsim
    overrides:
      data.preprocessed_dir: FMoW_LandSat_
      trainer.branch_ablation: true
      trainer.alternating_freeze: true
      trainer.alternating_freeze_period: 2
      spatial: gaussian_overlap_mask_encoding

  film_alternate_branches:
    model: densenet_film
    overrides:
      trainer.branch_ablation: true
      trainer.alternating_freeze: true
      trainer.alternating_freeze_period: 2


