slurm:
  partition: robolab
  cpus_per_task: 4
  mem_per_cpu: 8GB
  nodelist: gaia4,gaia7

global_overrides:
  optim: adam_warmup_cosine
  data.source: preprocessed
  data.preprocessed_dir: FMoW_LandSat_Norm

experiments:
  # ---------------- Backbone Models --------------------------------
  densenet_baseline:
    model: densenet_baseline

  densenet_baseline_no_pretrained:
    model: densenet_baseline
    overrides:
      model.hr_encoder.pretrained: false

  efficientformer_baseline:
    model: efficientformer_baseline
  
  efficientnet_baseline:
    model: efficientnet_baseline
  
  deit_baseline:
    model: deit_baseline

  satclip_image_enc_baseline:
    model: satclip_image_enc_baseline
    
  satclip_le_enc_baseline:
    model: satclip_le_enc_baseline

  satclip_le_enc_baseline_no_domain:
    model: satclip_le_enc_baseline
    overrides:
      model.lr_domain_loss_coeff: 0.0

  satclip_le_enc_baseline_l_40:
    model: satclip_le_enc_baseline
    overrides:
      model.encoder.legendre_polys: 40

  satclip_le_enc_baseline_l_40_no_domain:
    model: satclip_le_enc_baseline
    overrides:
      model.encoder.legendre_polys: 40
      model.lr_domain_loss_coeff: 0.0

  dinov3_baseline:
    model: dinov3_baseline

  dinov3_lr_baseline:
    model: dinov3_lr_baseline
  
  dinov3_lr_baseline_no_domain:
    model: dinov3_lr_baseline
    overrides:
      model.lr_domain_loss_coeff: 0.0

  # ---------------- LR features only -------------------------------
  densenet_lr_baseline:
    model: densenet_lr_baseline

  densenet_lr_baseline_no_domain:
    model: densenet_lr_baseline
    overrides:
      model.lr_domain_loss_coeff: 0.0

  densenet_lr_baseline_no_domain_zero_init:
    model: densenet_lr_baseline
    overrides:
      model.lr_domain_loss_coeff: 0.0
      model.landsat_channel_init: zero

  # ---------------- CoordDualBranch -------------------------------
  # Trained first with two linear layers, then with one linear only
  densenet_le_concat:
    model: densenet_le_concat

  densenet_le_film:
    model: densenet_le_film
  
  densenet_le_d3g:
    model: densenet_le_d3g

  densenet_le_geoprior:
    model: densenet_le_geoprior

  densenet_le_concat_l_40:
    model: densenet_le_concat
    overrides:
      model.encoder.legendre_polys: 40
 
  densenet_le_film_l_40:
    model: densenet_le_film
    overrides:
      model.encoder.legendre_polys: 40

  densenet_le_d3g_l_40:
    model: densenet_le_d3g
    overrides:
      model.encoder.legendre_polys: 40
  
  densenet_le_geoprior_l_40:
    model: densenet_le_geoprior
    overrides:
      model.encoder.legendre_polys: 40

  # ---------------- DomainDualBranch ------------------------------
  # Location-encoder ablation (Crasto & Rolf 2026, Sec. 5.3): location encoder
  # replaced by a learnable per-domain embedding. Mirrors the densenet_le_* runs.
  densenet_de_concat:
    model: densenet_de_concat

  densenet_de_film:
    model: densenet_de_film

  densenet_de_d3g:
    model: densenet_de_d3g

  densenet_de_geoprior:
    model: densenet_de_geoprior

  # ---------------- Dataset Normalization -------------------------
  # Normalized not with data statistics but with 0.5
  densenet_baseline_constnorm:
    model: densenet_baseline
    overrides:
      data.preprocessed_dir: FMoW_LandSat_ 

