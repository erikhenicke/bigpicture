# Decision-fusion experiments (Sum / Max / Min / GeoPrior rules).

slurm:
  partition: robolab
  cpus_per_task: 4
  mem_per_cpu: 8GB
  nodelist: gaia4,gaia5,gaia7

experiments:
  # ---------------- DenseNet ------------------------------------
  densenet_sum:
    model: densenet_decision_fusion
    overrides:
      model.decision_rule: sum

  densenet_max:
    model: densenet_decision_fusion
    overrides:
      model.decision_rule: max

  densenet_min:
    model: densenet_decision_fusion
    overrides:
      model.decision_rule: min

  densenet_geoprior:
    model: densenet_decision_fusion
    overrides:
      model.decision_rule: product

  # ---------------- DenseNet No Prior ------------------------------------
  densenet_sum_no_prior:
    model: densenet_decision_fusion
    overrides:
      model.decision_rule: sum
      model.use_class_prior: false

  densenet_max_no_prior:
    model: densenet_decision_fusion
    overrides:
      model.decision_rule: max
      model.use_class_prior: false

  densenet_min_no_prior:
    model: densenet_decision_fusion
    overrides:
      model.decision_rule: min
      model.use_class_prior: false

  densenet_geoprior_no_prior:
    model: densenet_decision_fusion
    overrides:
      model.decision_rule: product
      model.use_class_prior: false

  # ---------------- DenseNet No Domain ------------------------------------
  densenet_sum_no_domain:
    model: densenet_decision_fusion
    overrides:
      model.decision_rule: sum
      data.lr_feature_run_name: densenet_lr_baseline_no_domain

  densenet_max_no_domain:
    model: densenet_decision_fusion
    overrides:
      model.decision_rule: max
      data.lr_feature_run_name: densenet_lr_baseline_no_domain

  densenet_min_no_domain:
    model: densenet_decision_fusion
    overrides:
      model.decision_rule: min
      data.lr_feature_run_name: densenet_lr_baseline_no_domain

  densenet_geoprior_no_domain:
    model: densenet_decision_fusion
    overrides:
      model.decision_rule: product
      data.lr_feature_run_name: densenet_lr_baseline_no_domain

  # ---------------- DenseNet No Prior No Domain ------------------------------------
