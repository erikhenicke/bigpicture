# @package _global_
# SatCLIP-specific model settings from legacy script are model-specific and omitted here.
defaults:
  - override /optim: adam_plateau

run_name: train-multi-deit-satclip-like

trainer:
  max_epochs: 50

data:
  batch_size: 192
  frac: 1.0
  augment_train: true

model:
  hr_image_net: true
  lr_image_net: true

optim:
  optimizer:
    lr: 1.0e-4
  scheduler:
    factor: 0.5
    patience: 5
