# @package _global_
defaults:
  - override /model: late_fusion_deit_d3g
  - override /optim: adam_warmup_cosine

run_name: train-multi-deit-d3g

trainer:
  max_epochs: 50

data:
  batch_size: 384
  frac: 1.0
  augment_train: true



  lr_image_net: true
  d3g_loss_coeff: 0.5

optim:
  optimizer:
    lr: 2.0e-4
