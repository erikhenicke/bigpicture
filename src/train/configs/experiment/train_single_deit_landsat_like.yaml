# @package _global_
defaults:
  - override /optim: adam_plateau

run_name: train-single-deit-landsat-like

trainer:
  max_epochs: 50

data:
  batch_size: 384
  frac: 1.0
  augment_train: true

model:
  landsat_in_channels: 6
  hr_image_net: true
  lr_image_net: true

optim:
  optimizer:
    lr: 1.0e-4
  scheduler:
    factor: 0.5
    patience: 5
