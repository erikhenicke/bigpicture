# @package _global_
defaults:
  - override /optim: adam_plateau

run_name: train-multi-deit-like

trainer:
  max_epochs: 1

data:
  batch_size: 384
  frac: 0.01
  augment_train: true

model:
  hr_image_net: true
  lr_image_net: true

optim:
  optimizer:
    lr: 1.0e-4
  scheduler:
    factor: 0.5
    patience: 5
