metric_directions:
  test/test-od-task-ece: min

summary_metrics:
  - test/test-od-worst-group-task-acc
  - test/test-od-lr-domain-acc
  - test/test-od-hr-domain-acc

primary_metrics:
  - test/test-id-task-acc
  - test/test-id-top5-task-acc
  - test/test-od-task-acc
  - test/test-od-top5-task-acc
  - test/test-od-worst-group-task-acc
  - test/test-od-worst-group-top5-task-acc

# Per-class accuracy gain/loss plots (src/results/class_eval.py). Each comparison
# run gets a Test-OOD plot and a worst-region plot (baseline's worst OOD region),
# each showing the five largest per-class accuracy gains and losses vs. baseline.
class-eval:
  baseline: baselines@densenet_baseline
  runs:
    - spatial_extent@film_om_gauss_pe_freq_lr_crop_14_9km
    - film_om_gauss_pe_freq
    - d3g_detach_both_no_domain 
    - film_om_bin_pe_freq
    - film_pe_freq
    - film

groups:
  - name: Fusion Comparison
    runs:
      - baselines@densenet_baseline
      - concat_no_domain
      - film_no_domain

  - name: Fusion Comparison with Domain
    runs:
      - baselines@densenet_baseline
      - concat
      - film
      - d3g
    additional_metrics:
      - test/test-od-lr-domain-acc

  - name: Gradient Flow 
    runs:
      - film
      - film_detach
      - film_no_domain
      - d3g
      - d3g_no_domain
      - d3g_detach_lr
      - d3g_detach_hr
      - d3g_detach_hr_no_domain
      - d3g_detach_both
      - d3g_detach_both_no_domain
      - concat
      - concat_no_domain
      - concat_detach
    additional_metrics:
      - test/test-od-lr-domain-acc
  
  - name: ReLU Ablation
    runs:
      - film
      - film_relu
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc

  - name: Spatial Encodings
    runs:
      - baselines@densenet_baseline
      - film
      - film_om_gauss
      - film_pe_freq
      - film_om_gauss_pe_freq
          
  - name: Spatial Encodings Full
    runs:
      - baselines@densenet_baseline
      - film
      - film_om_bin
      - film_om_gauss
      - film_pe
      - film_pe_freq
      - film_om_bin_pe_freq
      - film_om_gauss_pe_freq
      - film_om_bin_pe
      - film_om_gauss_pe
  
  - name: DINOv3 FiLM
    runs:
      - baselines@dinov3_baseline
      - dinov3_film
      - dinov3_film_no_domain
      - dinov3_film_om_gauss_pe_freq

  - name: Channel Ablation
    runs:
      - film_om_gauss_pe_freq_lr_crop_14_9km
      - film_om_gauss_pe_freq_lr_crop_14_9km_rgb