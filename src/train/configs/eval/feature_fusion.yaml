metric_directions:
  test/test-od-task-ece: min
  test/test-id-task-ece: min
  test/test-od-task-entropy-correct: min
  test/test-id-task-entropy-correct: min

summary_metrics:
  - test/test-od-worst-group-task-acc
  - test/test-od-lr-domain-acc
  - test/test-od-hr-domain-acc

primary_metrics:
  - test/test-id-task-acc
  - test/test-id-top5-task-acc
  - test/test-id-region-europe-task-acc
  - test/test-id-region-asia-task-acc
  - test/test-id-region-americas-task-acc
  - test/test-id-region-africa-task-acc
  - test/test-id-region-oceania-task-acc
  - test/test-id-task-ece
  - test/test-id-task-entropy-correct
  - test/test-id-task-entropy-incorrect
  - test/test-od-task-acc
  - test/test-od-top5-task-acc 
  - test/test-od-region-europe-task-acc
  - test/test-od-region-asia-task-acc
  - test/test-od-region-americas-task-acc
  - test/test-od-region-africa-task-acc
  - test/test-od-region-oceania-task-acc
  - test/test-od-task-ece
  - test/test-od-task-entropy-correct
  - test/test-od-task-entropy-incorrect


# Per-class accuracy gain/loss plots (src/results/class_eval.py). Each comparison
# run gets a Test-OOD plot and a worst-region plot (baseline's worst OOD region),
# each showing the five largest per-class accuracy gains and losses vs. baseline.
class-eval:
  baseline: baselines@densenet_baseline
  runs:
    - baselines@densenet_baseline_pe_freq_hr
    - baselines@densenet_le_film_l_40
    - film_om_gauss_pe_freq
    - d3g_detach_hr_om_gauss_pe_freq_hr

groups:
  - name: Fusion Comparison
    runs:
      - baselines@densenet_baseline
      - concat_no_domain
      - film_no_domain
      - d3g_no_domain
    additional_metrics:
      - test/test-od-lr-domain-acc

  - name: Fusion Comparison with Domain
    runs:
      - baselines@densenet_baseline
      - concat
      - film
      - d3g
    additional_metrics:
      - test/test-od-lr-domain-acc

  - name: Loss-Gradient-Ablation FiLM Concat
    runs:
      - baselines@densenet_baseline
      - film
      - film_detach
      - concat
      - concat_detach
    additional_metrics:
      - test/test-od-lr-domain-acc
  
  - name: Loss-Gradient-Ablation D3G 
    runs:
      - baselines@densenet_baseline
      - d3g
      - d3g_no_domain
      - d3g_detach_lr
      - d3g_detach_lr_no_domain
      - d3g_detach_hr
      - d3g_detach_hr_no_domain
      - d3g_detach_both
      - d3g_detach_both_no_domain
    additional_metrics:
      - test/test-od-lr-domain-acc

  - name: ReLU Ablation
    runs:
      - film
      - film_relu
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc

  - name: Spatial Encodings FiLM
    runs:
      - film
      - film_om_bin
      - film_om_gauss
      - film_pe
      - film_pe_freq
      - film_om_bin_pe_freq
      - film_om_gauss_pe_freq
      - film_om_bin_pe
      - film_om_gauss_pe
      - film_om_gauss_pe_freq_hr
    additional_metrics: 
      - test/test-od-lr-domain-acc

          
  - name: Spatial Encodings D3G 
    runs:
      - d3g_detach_hr
      - d3g_detach_hr_om_gauss_pe_freq_hr
      - d3g_detach_hr_om_gauss
      - d3g_detach_hr_pe_freq_hr
      - d3g_detach_both_no_domain
      - d3g_detach_both_no_domain_pe_freq_hr
    additional_metrics: 
      - test/test-od-lr-domain-acc
  
  - name: DINOv3 Spatial Encodings 
    runs:
      - baselines@densenet_baseline
      - film
      - film_no_domain
      - film_om_gauss_pe_freq
      - d3g
      - d3g_detach_hr
      - d3g_detach_hr_om_gauss_pe_freq_hr
      - baselines@dinov3_baseline
      - dinov3_film
      - dinov3_film_no_domain
      - dinov3_film_om_gauss_pe_freq
      - dinov3_d3g
      - dinov3_d3g_detach_hr
      - dinov3_detach_hr_om_gauss_pe_freq_hr


  - name: Best Spatial Encodings
    runs:
      - baselines@densenet_baseline
      - baselines@densenet_baseline_pe_freq_hr
      - film_om_gauss_pe_freq
      - d3g_detach_hr_om_gauss_pe_freq_hr
      - baselines@densenet_le_film_l_40