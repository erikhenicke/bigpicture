metric_directions:
  test/test-od-task-ece: min

primary_metrics:
  - test/test-id-task-acc
  - test/test-od-task-acc
  - test/test-od-worst-group-task-acc

groups:
  # Input-level (early) fusion: 9-channel stack, single backbone, LR bands
  # zero-init. Naive lower bound. Grouped by backbone, HR-only baseline as
  # anchor; domain on/off toggled per backbone. lr-domain-acc shows what the
  # domain loss buys at the input level.
  - name: Input-Level Fusion
    runs:
      - baselines@densenet_baseline
      - densenet_stacked
      - densenet_stacked_zero_init
      - densenet_stacked_no_domain
      - densenet_stacked_zero_init_no_domain
      - densenet_stacked_he_init_no_domain
      - baselines@dinov3_baseline
      - dinov3_stacked
      - dinov3_stacked_zero_init
      - dinov3_stacked_no_domain
      - dinov3_stacked_zero_init_no_domain
    additional_metrics:
      - test/test-od-lr-domain-acc
