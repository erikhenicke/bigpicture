metric_directions:
  test/test-od-task-ece: min

summary_metrics:
  - test/test-od-worst-group-task-acc
  - test/test-od-lr-domain-acc
  - test/test-od-hr-domain-acc

primary_metrics:
  - test/test-od-task-acc
  - test/test-id-task-acc
  - test/test-od-worst-group-task-acc

groups:
  - name: Baselines
    runs:
      - baselines@densenet_baseline
      - baselines@deit_baseline
      - baselines@efficientnet_baseline
      - baselines@efficientformer_baseline
      - baselines@densenet_lr_baseline
      - baselines@densenet_lr_baseline_no_domain
    additional_metrics:
      - param_count

  - name: HR LR Encoder Comparison
    runs:
      - baselines@densenet_baseline
      - baselines@densenet_lr_baseline_no_domain

  - name: SatCLIP Fusion
    runs:
      - baselines@densenet_baseline
      - baselines@densenet_satclip_concat
      - baselines@densenet_satclip_film
      - baselines@densenet_satclip_d3g
      - baselines@densenet_satclip_geoprior

  - name: Fusion Comparison
    runs:
      - baselines@densenet_baseline
      - concat
      - film
      - geoprior
      - d3g
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc

  - name: Gradient Flow 
    runs:
      - film
      - film_detach
      - film_no_domain
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc
  
  - name: ReLU Ablation
    runs:
      - multsim
      - multsim_no_relu
      - film
      - film_relu
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc

  - name: Label Smoothing
    runs:
      - multsim
      - multsim_ls_0_1  
  
  - name: Normalization Ablation
    runs:
      - baselines@densenet_baseline
      - baselines@densenet_baseline_constnorm
      - multsim
      - multsim_constnorm
      - concat
      - concat_constnorm
      - d3g
      - d3g_detach_both_constnorm
      - multsim_om_gauss_constnorm
      - film
      - film_constnorm
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc

  - name: Spatial Encodings
    runs:
      - film
      - film_om_bin
      - film_om_gauss
      - film_pe
      - film_pe_freq
      - film_om_bin_pe_freq
      - film_om_gauss_pe_freq
      - film_om_bin_pe
      - film_om_gauss_pe
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc

  - name: Alternating Branch Freezing
    runs:
      - multsim
      - multsim_alternate_branches
      - multsim_alternate_om_gauss
      - film
      - film_alternate_branches

    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc
