metric_directions:
  test/test-od-task-ece: min

summary_metrics:
  - test/test-od-worst-group-task-acc
  - test/test-od-lr-domain-acc
  - test/test-od-hr-domain-acc

primary_metrics:
  - test/test-od-task-acc
  - test/test-id-task-acc
  - test/test-od-worst-group-task-acc

groups:
  - name: Fusion Comparison
    runs:
      - concat
      - film
      - geoprior
      - d3g
      - multsim
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc

  - name: Gradient Ablation
    runs:
      - multsim
      - multsim_detach
      - multsim_no_domain
      - concat_detach
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc
  
  - name: ReLU Ablation
    runs:
      - multsim
      - multsim_no_relu
      - film
      - film_relu
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc