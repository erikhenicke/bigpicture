metric_directions:
  test/test-od-task-ece: min

summary_metrics:
  - test/test-od-worst-group-task-acc
  - test/test-od-lr-domain-acc
  - test/test-od-hr-domain-acc

primary_metrics:
  - test/test-od-task-acc
  - test/test-id-task-acc
  - test/test-od-worst-group-task-acc

groups:
  - name: Baselines
    runs:
      - baselines@densenet_baseline
      - baselines@densenet_lr_baseline
      - baselines@densenet_lr_baseline_no_domain
      - baselines@densenet_satclip_concat
      - baselines@densenet_satclip_film
      - baselines@densenet_satclip_d3g
      - baselines@densenet_satclip_geoprior
    additional_metrics:
      - param_count

  - name: Fusion Comparison
    runs:
      - baselines@densenet_baseline
      - concat
      - film
      - geoprior
      - d3g
      - multsim
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc
      - param_count

  - name: Gradient Flow 
    runs:
      - multsim
      - multsim_detach
      - concat
      - concat_detach
      - d3g
      - d3g_detach_lr
      - d3g_detach_hr
      - d3g_detach_both
      - film
      - film_detach
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc
  
  - name: ReLU Ablation
    runs:
      - multsim
      - multsim_no_relu
      - film
      - film_relu
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc

  - name: Label Smoothing
    runs:
      - multsim
      - multsim_ls_0_1  
  
  - name: Normalization Ablation
    runs:
      - baselines@densenet_baseline
      - baselines@densenet_baseline_constnorm
      - multsim
      - multsim_constnorm
      - concat
      - concat_constnorm
      - d3g
      - d3g_detach_both_constnorm
      - multsim_overlap_gaussian_constnorm
      - film
      - film_constnorm
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc

  - name: Spatial Encodings
    runs:
      - multsim
      - multsim_fourier
      - multsim_coord
      - multsim_overlap_gaussian
      - film
      - film_overlap_binary
      - film_overlap_gaussian
      - film_coord
      - film_fourier
      - film_overlap_gaussian_fourier
    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc

  - name: Alternating Branch Freezing
    runs:
      - multsim
      - multsim_alternate_branches
      - multsim_alternate_overlap_gaussian
      - film
      - film_alternate_branches

    additional_metrics:
      - test/test-od-lr-ablated-worst-group-task-acc
      - test/test-od-hr-ablated-worst-group-task-acc