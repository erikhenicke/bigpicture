models:
  densenet_baseline: "DenseNet"
  densenet_concat: "Concat"
  densenet_film: "FiLM"
  densenet_d3g: "D3G"
  densenet_geoprior: "GeoPrior"
  densenet_multsim: "MultSim"
  densenet_lr_baseline: "DenseNet LR"
  efficientformer_baseline: "EfficientFormer"
  efficientnet_baseline: "EfficientNet"

params:
  model.lr_domain_loss_coeff:
    plain: "λ_dom"
    latex: '$\lambda_{\text{dom}}$'
  optim.domain_optimizer_lr_factor:
    plain: "μ_dom"
    latex: '$\mu_{\text{dom}}$'
  trainer.label_smoothing:
    plain: "ε"
    latex: '$\varepsilon$'
  model.learnable_relation_coeff:
    plain: "α_rel"
    latex: '$\alpha_{\text{rel}}$'
  model.consistency_loss_coeff:
    plain: "λ_con"
    latex: '$\lambda_{\text{con}}$'
  model.pred_domain_for_d3g:
    plain: "Domain Prediction"
    latex: "Domain Prediction"
  model.fusion.out_dim:
    plain: "d"
    latex: "$d$"
  model.detach_lr_for_task:
    plain: "Detach LR→Task"
    latex: "Detach LR$\\to$Task"
  model.detach_lr_for_consistency:
    plain: "Detach LR→Con"
    latex: "Detach LR$\\to$Con"
  model.detach_hr_for_consistency:
    plain: "Detach HR→Con"
    latex: "Detach HR$\\to$Con"
  model.fusion.pre_fusion_relu:
    plain: "Pre-ReLU"
    latex: "Pre-ReLU"
  model.landsat_channel_init:
    plain: "Ch-Init"
    latex: "Ch-Init"
  trainer.branch_ablation:
