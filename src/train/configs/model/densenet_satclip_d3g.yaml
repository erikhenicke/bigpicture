# @package _global_
model:
  hr_image_net: true

  hr_encoder:
    _target_: models.components.branches.DenseNetBranch
    in_channels: 3
    image_net: ${model.hr_image_net}

  lr_encoder:
    _target_: models.components.branches.SatCLIPLocationBranch
    satclip_repo_id: microsoft/SatCLIP-ViT16-L10
    satclip_ckpt_name: satclip-vit16-l10.ckpt
    freeze: false

  branches:
    _target_: models.components.branches.CoordDualBranch

  model:
    _target_: models.components.fusion_model.D3GModel

  lr_domain_loss_coeff: 0.1176
  consistency_loss_coeff: 0.2941
  learnable_relation_coeff: 0.8
  pred_domain_for_d3g: false
  domain_optimizer_lr_factor: 0.1
  detach_lr_for_consistency: false
  detach_hr_for_consistency: false

run_name: train-densenet-satclip-d3g
data:
  batch_size: 80
