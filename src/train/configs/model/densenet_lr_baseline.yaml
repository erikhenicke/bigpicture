# @package _global_
model:
  landsat_in_channels: 6
  lr_image_net: true
  landsat_channel_init: zero

  lr_encoder:
    _target_: models.components.branches.DenseNetBranch
    in_channels: ${model.landsat_in_channels}
    image_net: ${model.lr_image_net}
    landsat_channel_init: ${model.landsat_channel_init}

  model:
    _target_: models.components.fusion_model.SingleBranchLRModel

  lr_domain_loss_coeff: 0.1667

run_name: train-densenet-lr-baseline
data:
  batch_size: 128
