# @package _global_
model:
  landsat_in_channels: 6
  hr_image_net: true
  lr_image_net: true
  landsat_channel_init: average 

  hr_encoder:
    _target_: models.components.branches.DenseNetBranch
    in_channels: 3
    image_net: ${model.hr_image_net}

  lr_encoder:
    _target_: models.components.branches.DenseNetBranch
    in_channels: ${model.landsat_in_channels}
    image_net: ${model.lr_image_net}
    landsat_channel_init: ${model.landsat_channel_init}

  branches:
    _target_: models.components.branches.DualBranch
    landsat_channels: ${model.landsat_in_channels}

  spatial_encoding:
    coord_channels: false
    overlap_mask: false
    overlap_mask_type: binary
    fourier_bands: 0
    fourier_proj_dim: 0
    lr_span_km: 14.95

  fusion:
    _target_: models.components.fusion.ConcatFusion
    hr_dim: 1024
    lr_dim: 1024
    out_dim: 1024

  model:
    _target_: models.components.fusion_model.LateFusionModel

  lr_domain_loss_coeff: 0.1667
  domain_optimizer_lr_factor: 0.1
  detach_lr_for_task: false

run_name: train-densenet-concat
data:
  batch_size: 80 
