# @package _global_
model:
  landsat_in_channels: 6
  lr_pretrained: true
  landsat_channel_init: average

  lr_encoder:
    _target_: models.components.branches.DINOv3Branch
    in_channels: ${model.landsat_in_channels}
    pretrained: ${model.lr_pretrained}
    landsat_channel_init: ${model.landsat_channel_init}

  model:
    _target_: models.components.fusion_model.SingleBranchLRModel

  lr_domain_loss_coeff: 0.1667

run_name: train-dinov3-lr-baseline
data:
  batch_size: 64
  num_workers: 8
trainer:
  max_epochs: 10
optim:
  optimizer:
    lr: 1e-5