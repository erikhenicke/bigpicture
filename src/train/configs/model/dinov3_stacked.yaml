# @package _global_
model:
  landsat_in_channels: 6
  stacked_in_channels: 9  # 3 (RGB) + landsat_in_channels

  encoder:
    _target_: models.components.branches.DINOv3Branch
    in_channels: ${model.stacked_in_channels}
    pretrained: true
    landsat_channel_init: average
    stacked: true

  model:
    _target_: models.components.fusion_model.SingleBranchStackedModel

  lr_domain_loss_coeff: 0.1667

run_name: train-dinov3-stacked
data:
  batch_size: 64 
  num_workers: 8
trainer:
  max_epochs: 10
optim:
  optimizer:
    lr: 1e-4
