data:
  fmow_dir: /home/henicke/data
  landsat_dir: /home/datasets4/FMoW_LandSat
  preprocessed_dir_default: null
  preprocessed_dir_gaia: /data/henicke/FMoW_LandSat
  batch_size: 32
  num_workers: 4
  frac: 0.01
  augment_train: true
  train_split: train
  val_splits:
  - val
  - id_val
  test_splits:
  - test
  - id_test
  val_loader_names:
  - val-od
  - val-id
  test_loader_names:
  - test-od
  - test-id
model:
  num_labels: 62
  landsat_in_channels: 6
  hr_encoder:
    _target_: models.components.branches.DeitBranch
    in_channels: 3
    image_net: true
  lr_encoder:
    _target_: models.components.branches.DeitBranch
    in_channels: 6
    image_net: true
  branches:
    _target_: models.components.branches.DualBranch
    landsat_channels: ${model.landsat_in_channels}
  fusion:
    _target_: models.components.fusion.ConcatFusion
    hr_dim: 192
    lr_dim: 192
    out_dim: 256
  model:
    _target_: models.components.late_fusion_model.LateFusionModel
  region_index: 0
  domain_num_labels: 5
  domain_loss_alpha: 0.2
  domain_optimizer_lr_factor: 0.1
  domain_optimizer_weight_decay: 0.0
  domain_scheduler_gamma: 0.96
  domain_scheduler_step_size: 1
  ece_n_bins: 10
  monitor_metric: val/val-od-worst-group-task-acc
  compile: false
optim:
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 5.0e-05
    weight_decay: 0.0
  scheduler:
    _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
    _partial_: true
    mode: max
    factor: 0.5
    patience: 5
  domain_optimizer:
    _target_: torch.optim.Adam
    _partial_: true
    weight_decay: 0.0
  domain_scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    _partial_: true
    step_size: 1
    gamma: 0.96
trainer:
  accelerator: auto
  devices: 1
  max_epochs: 1
  log_every_n_steps: 25
wandb:
  project: fmow
  run_name: ${run_name}-${now:%y-%m-%d}
  log_model: false
  save_dir: log
checkpoint:
  checkpoint_dir: log/checkpoints
seed: 111
run_name: late-fusion-lightning-hydra-test
