data:
  fmow_dir: /home/henicke/data
  landsat_dir: /home/datasets4/FMoW_LandSat
  preprocessed_dir_default: null
  preprocessed_dir_gaia: /data/henicke/FMoW_LandSat
  batch_size: 384
  num_workers: 4
  frac: 1.0
  augment_train: true
  train_split: train
  val_splits:
  - val
  - id_val
  test_splits:
  - test
  - id_test
  val_loader_names:
  - val-od
  - val-id
  test_loader_names:
  - test-od
  - test-id
model:
  landsat_in_channels: 6
  hr_image_net: true
  lr_image_net: true
  hr_encoder:
    _target_: models.components.branches.DeitBranch
    in_channels: 3
    image_net: ${model.hr_image_net}
  lr_encoder:
    _target_: models.components.branches.DeitBranch
    in_channels: ${model.landsat_in_channels}
    image_net: ${model.lr_image_net}
  branches:
    _target_: models.components.branches.DualBranch
    landsat_channels: ${model.landsat_in_channels}
  model:
    _target_: models.components.late_fusion_model.D3GModel
  enable_domain_head: true
  domain_loss_coeff: 0.2
  learnable_relation_coeff: 0.8
  d3g_loss_coeff: 0.5
  pred_domain_for_d3g: true
  domain_optimizer_lr_factor: 0.1
      optim:
  optimizer:
    _target_: torch.optim.Adam
    _partial_: true
    lr: 0.0001
    weight_decay: 0.0
  scheduler:
    _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
    _partial_: true
    mode: max
    factor: 0.5
    patience: 5
  domain_optimizer:
    _target_: torch.optim.Adam
    _partial_: true
    weight_decay: 0.0
  domain_scheduler:
    _target_: torch.optim.lr_scheduler.StepLR
    _partial_: true
    step_size: 1
    gamma: 0.96
trainer:
  accelerator: auto
  devices: 1
  max_epochs: 50
  log_every_n_steps: 25
  ece_n_bins: 10
  monitor_metric: val/val-od-worst-group-task-acc
  compile: true
wandb:
  project: fmow
  run_name: ${run_name}-${now:%y-%m-%d-%H-%M-%S}
  log_model: false
  save_dir: log
checkpoint:
  checkpoint_dir: log/checkpoints
run_name: late-fusion-lightning-hydra-test
num_task_labels: 62
num_domain_labels: 6
domain_index: 0
seed: 111
